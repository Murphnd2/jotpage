<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#5c4033">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
    <title>Jyrnyl — Offline</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="/css/theme.css" rel="stylesheet">
    <style>
        body {
            background:
                radial-gradient(circle at 20% 20%, rgba(212,148,58,0.08), transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(160,82,45,0.06), transparent 45%),
                var(--bg-cream);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .offline-card {
            background: var(--bg-card);
            border: 1px solid var(--border-warm);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-paper);
            padding: 48px 40px 40px;
            text-align: center;
            max-width: 460px;
            width: 100%;
        }
        .offline-logo {
            width: 96px;
            height: 96px;
            margin: 0 auto 14px;
            display: block;
        }
        .offline-card h1 {
            font-family: var(--font-serif);
            font-weight: 700;
            color: var(--accent-brown);
            font-size: 2.2rem;
            margin: 0 0 8px;
        }
        .offline-card .sub {
            font-family: var(--font-serif);
            font-style: italic;
            color: var(--text-muted);
            margin-bottom: 24px;
        }
        .offline-card button {
            font-family: var(--font-body);
            background: var(--accent-brown);
            color: #fff;
            border: 0;
            border-radius: var(--radius-md);
            padding: 10px 22px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .offline-card button:hover {
            background: var(--accent-brown-dark);
        }
        .offline-rule {
            width: 64px;
            height: 2px;
            background: var(--accent-gold);
            border: 0;
            margin: 14px auto 20px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <img src="/images/jyrnyl-logo-square.svg" alt="Jyrnyl" class="offline-logo">
        <h1>You're offline</h1>
        <hr class="offline-rule">
        <p class="sub">The record's still spinning — we just can't reach the server right now.</p>
        <button onclick="location.reload()">Try again</button>
    </div>
</body>
</html>
