<path d="M355 218 L352 228 L358 228 Z" fill="#C9A84C"/>
<circle cx="355" cy="230" r="3" fill="#C9A84C" opacity="0.7"/>
<circle cx="420" cy="100" r="9" fill="#5C4033" stroke="#C9A84C" stroke-width="1.5"/>

<!-- Wordmark right side -->
<text x="900" y="265" text-anchor="middle" font-family="'Playfair Display', Georgia, serif" font-size="88" font-weight="700" fill="#FAF6F0" letter-spacing="12">JYRNYL</text>
<text x="900" y="310" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#C9A84C" letter-spacing="8">RECORD YOUR LIFE</text>
