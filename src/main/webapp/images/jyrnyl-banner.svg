<path d="M500 260 Q550 250 620 255 Q680 262 750 254 Q820 248 880 256" fill="none" stroke="#C9A84C" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>

<!-- Center label -->
<circle cx="250" cy="250" r="50" fill="#7C3238"/>
<circle cx="250" cy="250" r="46" fill="none" stroke="#9C4248" stroke-width="0.4"/>
<circle cx="250" cy="250" r="6" fill="#1a1410"/>
<!-- J on label -->
